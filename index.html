<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Job Detector</title>
    <style>
        /* ... Keep all your existing CSS styles exactly the same ... */
        :root { --bg-color: #f4f4f9; --text-color: #333; --primary-color: #4a90e2; --danger-color: #e74c3c; --warning-color: #f39c12; --success-color: #2ecc71; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 2rem; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: var(--card-bg); padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 2rem; }
        .input-group { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-direction: column; }
        .url-row { display: flex; gap: 10px; }
        input[type="url"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        
        /* New styles for the manual text area */
        #manualEntry { display: none; margin-top: 10px; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; resize: vertical; box-sizing: border-box; font-family: inherit; }
        .fallback-text { font-size: 0.9rem; color: #555; margin-bottom: 5px; font-weight: bold; }

        button { padding: 12px 24px; background-color: var(--primary-color); color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #357abd; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { font-size: 0.9rem; color: #666; margin-bottom: 1rem; text-align: center; }
        .error-message { color: var(--danger-color); background: #fadbd8; padding: 10px; border-radius: 5px; display: none; margin-bottom: 1rem; }
        #results { display: none; border-top: 2px solid #eee; padding-top: 1.5rem; }
        .score-badge { display: inline-block; padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem; }
        .score-High { background-color: var(--danger-color); }
        .score-Medium { background-color: var(--warning-color); }
        .score-Low { background-color: var(--success-color); }
        .breakdown-list { list-style: none; padding: 0; }
        .breakdown-list li { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .breakdown-list li::before { content: "⚠️"; margin-right: 10px; }
        .positive-signal::before { content: "✅" !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ghost Job Detector 👻</h1>
    <p class="subtitle">Paste a job posting URL to analyze its likelihood of being a ghost/recycled job.</p>

    <div class="input-group">
        <div class="url-row">
            <input type="url" id="jobUrl" placeholder="https://www.indeed.com/viewjob?jk=..." required>
            <button id="analyzeBtn" onclick="analyzeJob()">Analyze URL</button>
        </div>
        
        <div id="manualEntry">
            <p class="fallback-text">Scraping blocked! Please copy and paste the job description text below instead:</p>
            <textarea id="jobText" placeholder="Paste the full job description text here..."></textarea>
            <button onclick="analyzeManualText()" style="width: 100%; margin-top: 10px;">Analyze Text</button>
        </div>
    </div>

    <div id="status" class="status"></div>
    <div id="errorBox" class="error-message"></div>

    <div id="results">
        <h2>Analysis Results</h2>
        <div>Likelihood: <span id="scoreBadge" class="score-badge"></span></div>
        <p><strong>Signals Detected:</strong></p>
        <ul id="breakdownList" class="breakdown-list"></ul>
    </div>
</div>

<script>
    async function analyzeJob() {
        const urlInput = document.getElementById('jobUrl').value.trim();
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusEl = document.getElementById('status');
        const errorBox = document.getElementById('errorBox');
        const manualEntryBox = document.getElementById('manualEntry');
        
        // Reset UI
        errorBox.style.display = 'none';
        document.getElementById('results').style.display = 'none';
        document.getElementById('breakdownList').innerHTML = '';
        manualEntryBox.style.display = 'none';
        
        if (!urlInput) {
            showError("Please enter a valid URL.");
            return;
        }

        analyzeBtn.disabled = true;
        statusEl.textContent = "Attempting to fetch job data...";

        try {
            // Trying corsproxy.io as it sometimes has better success rates than allorigins
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(urlInput)}`;
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error("Blocked by bot protection or CORS");
            
            const htmlText = await response.text();
            
            statusEl.textContent = "Analyzing job description heuristics...";
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const pageText = doc.body.innerText.toLowerCase();

            if (pageText.includes("verify you are human") || pageText.includes("cloudflare") || pageText.includes("security check")) {
                throw new Error("CAPTCHA detected");
            }

            runHeuristics(pageText);

        } catch (error) {
            showError(`Error fetching URL. Job board is blocking scrapers. Please use the text box below.`);
            // Reveal the manual text entry fallback
            manualEntryBox.style.display = 'block';
        } finally {
            analyzeBtn.disabled = false;
            statusEl.textContent = "";
        }
    }

    // New function to handle manual text analysis
    function analyzeManualText() {
        const textInput = document.getElementById('jobText').value.trim();
        if (!textInput) {
            showError("Please paste the job description text first.");
            return;
        }
        
        document.getElementById('errorBox').style.display = 'none';
        document.getElementById('results').style.display = 'none';
        document.getElementById('breakdownList').innerHTML = '';
        
        runHeuristics(textInput.toLowerCase());
    }

    function runHeuristics(text) {
        const listEl = document.getElementById('breakdownList');
        const badgeEl = document.getElementById('scoreBadge');
        const resultsContainer = document.getElementById('results');
        
        let score = 0;
        const signals = [];

        if (text.match(/30\+\s*days/i) || text.match(/month ago/i)) {
            score += 3;
            signals.push({ text: "Job posted 30+ days ago (High risk of being inactive)", risk: true });
        } else if (text.match(/just posted/i) || text.match(/[1-3]\s*days ago/i)) {
            signals.push({ text: "Posted very recently", risk: false });
        }

        if (text.match(/always looking for/i) || text.match(/pipeline/i) || text.match(/accepting applications on an ongoing basis/i)) {
            score += 3;
            signals.push({ text: "Language suggests an 'evergreen' or pipeline req, not an immediate opening", risk: true });
        }

        if (!text.match(/\$\d{2,3}(,\d{3})?/i) && !text.match(/€\d{2,3}/i)) { // Added Euro check for German sites like Personio
            score += 1;
            signals.push({ text: "No concrete salary numbers found in the text", risk: true });
        }

        if (!text.includes("requirements") && !text.includes("qualifications") && !text.includes("experience with") && !text.includes("anforderungen")) { // Added German keyword
            score += 2;
            signals.push({ text: "Missing standard sections like 'Requirements' or 'Qualifications'", risk: true });
        }

        if (text.match(/rockstar/i) || text.match(/wear many hats/i) || text.match(/fast-paced/i)) {
            score += 1;
            signals.push({ text: "Uses buzzwords often associated with high-turnover or poorly defined roles", risk: true });
        }

        if (signals.length === 0) {
            const li = document.createElement('li');
            li.textContent = "Could not extract clear signals. The text may be too short.";
            listEl.appendChild(li);
        } else {
            signals.forEach(sig => {
                const li = document.createElement('li');
                li.textContent = sig.text;
                if (!sig.risk) {
                    li.classList.add('positive-signal');
                }
                listEl.appendChild(li);
            });
        }

        let likelihood = "Low";
        badgeEl.className = "score-badge score-Low";
        if (score >= 5) {
            likelihood = "High";
            badgeEl.className = "score-badge score-High";
        } else if (score >= 2) {
            likelihood = "Medium";
            badgeEl.className = "score-badge score-Medium";
        }

        badgeEl.textContent = likelihood;
        resultsContainer.style.display = 'block';
    }

    function showError(msg) {
        const errorBox = document.getElementById('errorBox');
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
    }
</script>

</body>
</html>
