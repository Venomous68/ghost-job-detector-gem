<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Job Detector</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --success-color: #2ecc71;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="url"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            text-align: center;
        }

        .error-message {
            color: var(--danger-color);
            background: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            display: none;
            margin-bottom: 1rem;
        }

        #results {
            display: none;
            border-top: 2px solid #eee;
            padding-top: 1.5rem;
        }

        .score-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .score-High { background-color: var(--danger-color); }
        .score-Medium { background-color: var(--warning-color); }
        .score-Low { background-color: var(--success-color); }

        .breakdown-list {
            list-style: none;
            padding: 0;
        }

        .breakdown-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .breakdown-list li::before {
            content: "⚠️";
            margin-right: 10px;
        }

        .positive-signal::before {
            content: "✅" !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ghost Job Detector 👻</h1>
    <p class="subtitle">Paste a job posting URL to analyze its likelihood of being a ghost/recycled job.</p>

    <div class="input-group">
        <input type="url" id="jobUrl" placeholder="https://www.indeed.com/viewjob?jk=..." required>
        <button id="analyzeBtn" onclick="analyzeJob()">Analyze</button>
    </div>

    <div id="status" class="status"></div>
    <div id="errorBox" class="error-message"></div>

    <div id="results">
        <h2>Analysis Results</h2>
        <div>Likelihood: <span id="scoreBadge" class="score-badge"></span></div>
        <p><strong>Signals Detected:</strong></p>
        <ul id="breakdownList" class="breakdown-list"></ul>
    </div>
</div>

<script>
    async function analyzeJob() {
        const urlInput = document.getElementById('jobUrl').value.trim();
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusEl = document.getElementById('status');
        const errorBox = document.getElementById('errorBox');
        const resultsEl = document.getElementById('results');
        const breakdownList = document.getElementById('breakdownList');
        const scoreBadge = document.getElementById('scoreBadge');

        // Reset UI
        errorBox.style.display = 'none';
        resultsEl.style.display = 'none';
        breakdownList.innerHTML = '';
        
        if (!urlInput) {
            showError("Please enter a valid URL.");
            return;
        }

        analyzeBtn.disabled = true;
        statusEl.textContent = "Fetching job data (bypassing CORS via proxy)...";

        try {
            // Using allorigins.win to bypass CORS restrictions
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error("Network response was not ok.");
            
            const data = await response.json();
            
            if (!data.contents) {
                throw new Error("Could not retrieve page content. The site may be blocking proxy requests.");
            }

            statusEl.textContent = "Analyzing job description heuristics...";
            
            // Parse the fetched HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const pageText = doc.body.innerText.toLowerCase();

            // Check for bot protections (CAPTCHAs)
            if (pageText.includes("verify you are human") || pageText.includes("cloudflare") || pageText.includes("security check")) {
                throw new Error("Scraping blocked. The job board presented a CAPTCHA or security challenge to the proxy.");
            }

            runHeuristics(pageText, breakdownList, scoreBadge, resultsEl);

        } catch (error) {
            showError(`Error: ${error.message}. Note: Client-side fetching often fails on major job boards due to bot protection.`);
        } finally {
            analyzeBtn.disabled = false;
            statusEl.textContent = "";
        }
    }

    function runHeuristics(text, listEl, badgeEl, resultsContainer) {
        let score = 0;
        const signals = [];

        // 1. Check Age of posting
        if (text.match(/30\+\s*days/i) || text.match(/month ago/i)) {
            score += 3;
            signals.push({ text: "Job posted 30+ days ago (High risk of being inactive)", risk: true });
        } else if (text.match(/just posted/i) || text.match(/[1-3]\s*days ago/i)) {
            signals.push({ text: "Posted very recently", risk: false });
        }

        // 2. Evergreen / Continuous hiring keywords
        if (text.match(/always looking for/i) || text.match(/pipeline/i) || text.match(/accepting applications on an ongoing basis/i)) {
            score += 3;
            signals.push({ text: "Language suggests an 'evergreen' or pipeline req, not an immediate opening", risk: true });
        }

        // 3. Lack of Salary
        if (!text.match(/\$\d{2,3}(,\d{3})?/i)) {
            score += 1;
            signals.push({ text: "No concrete salary numbers found in the text", risk: true });
        }

        // 4. Vague Description (Lack of concrete requirements)
        if (!text.includes("requirements") && !text.includes("qualifications") && !text.includes("experience with")) {
            score += 2;
            signals.push({ text: "Missing standard sections like 'Requirements' or 'Qualifications'", risk: true });
        }

        // 5. Broad / Suspicious language
        if (text.match(/rockstar/i) || text.match(/wear many hats/i) || text.match(/fast-paced/i)) {
            score += 1;
            signals.push({ text: "Uses buzzwords often associated with high-turnover or poorly defined roles", risk: true });
        }

        // Render Signals
        if (signals.length === 0) {
            const li = document.createElement('li');
            li.textContent = "Could not extract clear signals. The text may be obfuscated or deeply nested in Javascript.";
            listEl.appendChild(li);
        } else {
            signals.forEach(sig => {
                const li = document.createElement('li');
                li.textContent = sig.text;
                if (!sig.risk) {
                    li.classList.add('positive-signal');
                }
                listEl.appendChild(li);
            });
        }

        // Determine Likelihood
        let likelihood = "Low";
        badgeEl.className = "score-badge score-Low";
        if (score >= 5) {
            likelihood = "High";
            badgeEl.className = "score-badge score-High";
        } else if (score >= 2) {
            likelihood = "Medium";
            badgeEl.className = "score-badge score-Medium";
        }

        badgeEl.textContent = likelihood;
        resultsContainer.style.display = 'block';
    }

    function showError(msg) {
        const errorBox = document.getElementById('errorBox');
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
    }
</script>

</body>
</html>
